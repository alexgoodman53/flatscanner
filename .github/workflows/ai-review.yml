name: AI Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to review
        required: true
        type: string
      pr_number:
        description: Pull request number
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  codex-review:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on:
      - self-hosted
      - windows
      - codex

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Run local Codex review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: powershell -NoProfile -NonInteractive -ExecutionPolicy Bypass -File .\scripts\run-codex-pr-review.ps1

      - name: Print review diagnostics
        if: always()
        shell: powershell
        run: |
          $tempRoot = if ($env:RUNNER_TEMP) { $env:RUNNER_TEMP } else { $env:TEMP }
          $diagnosticPath = Join-Path $tempRoot 'codex-review-diagnostics.log'
          $transcriptPath = Join-Path $tempRoot 'codex-review-transcript.log'

          if (Test-Path $diagnosticPath) {
            Write-Host '--- codex-review-diagnostics.log ---'
            Get-Content $diagnosticPath
          }
          else {
            Write-Host 'No diagnostic log produced.'
          }

          if (Test-Path $transcriptPath) {
            Write-Host '--- codex-review-transcript.log ---'
            Get-Content $transcriptPath
          }
          else {
            Write-Host 'No transcript log produced.'
          }
