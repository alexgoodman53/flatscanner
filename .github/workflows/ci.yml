name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to validate
        required: false
        default: ""
        type: string

jobs:
  baseline-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Verify repository structure
        shell: bash
        run: |
          set -euo pipefail
          test -f AGENTS.md
          test -f CLAUDE.md
          test -f .specify/memory/constitution.md
          test -d specs
          test -d src
          test -d tests
          test -d scripts

      - name: Detect future stack files
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package.json ]; then
            echo "Detected package.json. Add JavaScript CI commands to this workflow."
          fi
          if [ -f pyproject.toml ] || [ -f requirements.txt ]; then
            echo "Detected Python project files. Add Python CI commands to this workflow."
          fi
          if [ -f Cargo.toml ]; then
            echo "Detected Rust project files. Add Rust CI commands to this workflow."
          fi

  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest
